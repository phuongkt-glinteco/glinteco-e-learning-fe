<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAMPUP · Pixel Onboarding Portal</title>
  <link rel="stylesheet" href="app-design/theme.css" />
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body, #root { height: 100%; }
  </style>
</head>
<body data-theme="dark">
  <div id="root"></div>

  <script type="text/babel" src="app-design/data.jsx"></script>
  <script type="text/babel" src="app-design/ui.jsx"></script>
  <script type="text/babel" src="app-design/Login.jsx"></script>
  <script type="text/babel" src="app-design/Dashboard.jsx"></script>
  <script type="text/babel" src="app-design/Tracks.jsx"></script>
  <script type="text/babel" src="app-design/Docs.jsx"></script>
  <script type="text/babel" src="app-design/Exercises.jsx"></script>
  <script type="text/babel" src="app-design/Shell.jsx"></script>
  <script type="text/babel" data-presets="react">
    function boot() {
      if (!window.Portal) { return setTimeout(boot, 40); }
      ReactDOM.createRoot(document.getElementById('root')).render(<Portal />);
    }
    boot();
  </script>
</body>
</html>
