openapi: 3.0.3
info:
  title: RAMP UP — Engineering Onboarding Portal API
  description: |
    Tài liệu đặc tả API (OpenAPI Specification) cho hệ thống **RAMP UP** (Glinteco e-Learning).
    Hệ thống cung cấp cổng thông tin đào tạo nội bộ gamified dành cho các kỹ sư mới gia nhập Glinteco.
    
    ### Quy ước chung:
    * **Base URL:** `/api/v1` (mặc định môi trường development: `https://api.glinteco-elearning.dev/api/v1`)
    * **Xác thực:** Ngoại trừ các route Auth public, tất cả các request yêu cầu header `Authorization: Bearer <accessToken>`.
    * **Định dạng thời gian:** Chuẩn ISO-8601 UTC (ví dụ: `2026-06-16T15:16:56Z`).
    * **Phân trang danh sách (Pagination):** Sử dụng Keyset/Cursor Pagination với định dạng phản hồi chung:
      ```json
      {
        "data": [...],
        "nextCursor": "<opaque_string_or_null>",
        "hasMore": true
      }
      ```
    * **Quản lý lỗi (Error Envelopes):** Các lỗi trả về định dạng chuẩn:
      ```json
      {
        "statusCode": 400,
        "message": ["email must be a valid email"],
        "error": "Bad Request"
      }
      ```
  version: 1.0.0
servers:
  - url: https://api.glinteco-elearning.dev/api/v1
    description: Môi trường Development
paths:
  # =========================================================================
  # 1. AUTH & SESSION
  # =========================================================================
  /auth/register:
    post:
      summary: Đăng ký tài khoản mới (Public)
      description: Tạo tài khoản learner mới với email, password và họ tên.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Ada Lovelace
                email:
                  type: string
                  format: email
                  example: ada@acme.dev
                password:
                  type: string
                  format: password
                  example: hunter2-very-strong
      responses:
        '201':
          description: Đăng ký thành công và tự động tạo phiên đăng nhập.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  accessToken:
                    type: string
                    example: eyJhbGciOiJIUzI1Ni…
                  refreshToken:
                    type: string
                    example: rt_a1b2c3d4e5f6
                  expiresIn:
                    type: integer
                    description: Thời hạn token tính bằng giây (ví dụ 900 = 15 phút).
                    example: 900
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email đã được sử dụng.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Đăng nhập bằng Email & Password (Public)
      description: Xác thực người dùng bằng email và mật khẩu để lấy access token và refresh token.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: mina@acme.dev
                password:
                  type: string
                  format: password
                  example: password123
                rememberMe:
                  type: boolean
                  default: false
                  example: true
      responses:
        '200':
          description: Đăng nhập thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  accessToken:
                    type: string
                    example: eyJhbGciOiJIUzI1Ni…
                  refreshToken:
                    type: string
                    example: rt_9z8y7x6w
                  expiresIn:
                    type: integer
                    example: 900
        '401':
          description: Sai thông tin đăng nhập.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/google:
    post:
      summary: Đăng nhập / Đăng ký qua Google OAuth (Public)
      description: Sử dụng ID Token gửi từ client sau khi xác thực qua Google. Tài khoản mới sẽ được tự động kích hoạt vai trò `learner`.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idToken
              properties:
                idToken:
                  type: string
                  example: google-oauth2-id-token-here
      responses:
        '200':
          description: Xác thực Google thành công. Trả về thông tin phiên giống như `/auth/login`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  accessToken:
                    type: string
                    example: eyJhbGciOiJIUzI1Ni…
                  refreshToken:
                    type: string
                    example: rt_9z8y7x6w
                  expiresIn:
                    type: integer
                    example: 900
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      summary: Làm mới Access Token (Public)
      description: Gửi refresh token hiện tại để nhận access token mới cùng refresh token mới.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: rt_9z8y7x6w
      responses:
        '200':
          description: Cấp token mới thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: eyJhbGciOiJIUzI1Ni…
                  refreshToken:
                    type: string
                    example: rt_new1234
                  expiresIn:
                    type: integer
                    example: 900
        '401':
          description: Refresh token không hợp lệ hoặc đã hết hạn.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Đăng xuất (Authenticated)
      description: Thu hồi refresh token hiện tại để hủy phiên làm việc.
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Đăng xuất thành công. Không có dữ liệu trả về.
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/forgot-password:
    post:
      summary: Yêu cầu đặt lại mật khẩu (Public)
      description: Gửi email liên kết đặt lại mật khẩu nếu tài khoản tồn tại trong hệ thống.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: mina@acme.dev
      responses:
        '202':
          description: Yêu cầu đã được tiếp nhận.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: If the account exists, a reset link has been sent.

  /auth/reset-password:
    post:
      summary: Đặt lại mật khẩu mới (Public)
      description: Sử dụng token nhận được từ email để thiết lập mật khẩu mới.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
              properties:
                token:
                  type: string
                  example: reset_tok_abc123
                password:
                  type: string
                  format: password
                  example: new-strong-password
      responses:
        '200':
          description: Đổi mật khẩu thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password updated. Please sign in.
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/me:
    get:
      summary: Lấy thông tin tài khoản hiện tại (Authenticated)
      description: Lấy thông tin chi tiết của người dùng đang đăng nhập dựa trên JWT access token.
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # =========================================================================
  # 2. USERS & PROFILE
  # =========================================================================
  /users:
    get:
      summary: Danh sách người dùng (Admin)
      description: Lấy danh sách người dùng trong hệ thống hỗ trợ tìm kiếm và lọc. Chỉ dành cho vai trò `admin`.
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - name: cohortId
          in: query
          description: Lọc danh sách theo Cohort ID
          required: false
          schema:
            type: string
            example: c_spring2026
        - name: role
          in: query
          description: Lọc theo vai trò (learner hoặc admin)
          required: false
          schema:
            type: string
            enum: [learner, admin]
            example: learner
        - name: q
          in: query
          description: Tìm kiếm theo họ tên hoặc email
          required: false
          schema:
            type: string
            example: Mina
        - name: limit
          in: query
          description: Giới hạn số lượng bản ghi trả về (tối đa 50)
          required: false
          schema:
            type: integer
            maximum: 50
            default: 20
            example: 20
        - name: cursor
          in: query
          description: Cursor phục vụ phân trang danh sách
          required: false
          schema:
            type: string
            example: eyJjcmVhdGVkQXQiOiIyMDI2…
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserSummary'
                  nextCursor:
                    type: string
                    nullable: true
                    example: eyJjcmVhdGVkQXQiOiIyMDI2…
                  hasMore:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /users/{id}:
    get:
      summary: Lấy chi tiết thông tin một người dùng (Authenticated)
      description: |
        Lấy thông tin profile chi tiết của một kỹ sư.
        * Quy tắc phân quyền:* `learner` chỉ được phép lấy chính profile của họ, `admin` được phép lấy bất kỳ ai.
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của người dùng cần xem
          required: true
          schema:
            type: string
            example: u_mina01
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Không đủ quyền truy cập (Learner xem profile người khác).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy người dùng.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    patch:
      summary: Cập nhật thông tin profile cá nhân (Authenticated)
      description: Cho phép người dùng tự chỉnh sửa một số thuộc tính profile cá nhân như chức danh (title) hoặc màu đại diện (avatarHue).
      tags:
        - Users
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Senior Frontend Engineer
                avatarHue:
                  type: integer
                  minimum: 0
                  maximum: 360
                  example: 200
      responses:
        '200':
          description: Cập nhật thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: u_mina01
                  title:
                    type: string
                    example: Senior Frontend Engineer
                  avatarHue:
                    type: integer
                    example: 200
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me/stats:
    get:
      summary: Thống kê tiến độ & Gamification cá nhân (Learner)
      description: Lấy bộ dữ liệu thống kê tổng hợp dùng để hiển thị trên màn hình dashboard của học viên (Level, XP, Streak, Tỷ lệ hoàn thành, số bài tập, bookmark).
      tags:
        - Users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDashboardStats'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me/notifications/slack:
    post:
      summary: Đăng ký nhận thông báo qua Slack (Proposed - Learner)
      description: Thiết lập liên kết tài khoản hệ thống với Slack Member ID để nhận thông báo thời gian thực về bài nộp và tiến độ.
      tags:
        - Users
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - slackMemberId
              properties:
                slackMemberId:
                  type: string
                  description: ID định danh của user trên workspace Slack
                  example: U12345678
      responses:
        '200':
          description: Liên kết thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    example: u_mina01
                  slackMemberId:
                    type: string
                    example: U12345678
                  slackNotificationsEnabled:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # =========================================================================
  # 3. COHORTS (ADMIN ANALYTICS)
  # =========================================================================
  /cohorts:
    get:
      summary: Danh sách khóa học (Admin)
      description: Lấy danh sách các Cohort khóa học hiện có kèm thống kê sơ bộ về số lượng học viên và tỷ lệ hoàn thành trung bình.
      tags:
        - Cohorts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CohortSummary'
                  nextCursor:
                    type: string
                    nullable: true
                    example: null
                  hasMore:
                    type: boolean
                    example: false
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      summary: Khởi tạo khóa học mới (Proposed - Admin)
      description: Tạo mới một khóa học (Cohort) để quản lý luồng học viên.
      tags:
        - Cohorts
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Tên khóa học
                  example: Summer 2026
                targetRampDays:
                  type: integer
                  description: Số ngày mục tiêu để hoàn thành lộ trình
                  default: 14
                  example: 14
      responses:
        '201':
          description: Tạo thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohortDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /cohorts/{id}:
    get:
      summary: Lấy chi tiết thông tin khóa học (Admin)
      description: Trả về thông tin cấu hình chi tiết cùng các chỉ số KPI trung bình của khóa học.
      tags:
        - Cohorts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của Cohort
          required: true
          schema:
            type: string
            example: c_spring2026
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohortDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Không tìm thấy Cohort.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Chỉnh sửa cấu hình khóa học (Proposed - Admin)
      description: Cập nhật các thông số của Cohort như tên khóa học hoặc số ngày target ramp-up.
      tags:
        - Cohorts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của Cohort cần sửa
          required: true
          schema:
            type: string
            example: c_summer2026
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Summer 2026 (Updated)
                targetRampDays:
                  type: integer
                  example: 12
      responses:
        '200':
          description: Cập nhật thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohortDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /cohorts/{id}/overview:
    get:
      summary: Thống kê Dashboard khóa học (Admin)
      description: Lấy dữ liệu KPI tổng hợp dạng thẻ số liệu phục vụ màn hình dashboard của Admin đối với một khóa học.
      tags:
        - Cohorts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của Cohort
          required: true
          schema:
            type: string
            example: c_spring2026
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CohortDashboardStats'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /cohorts/{id}/track-completion:
    get:
      summary: Biểu đồ tỷ lệ hoàn thành theo Milestone (Admin)
      description: Lấy tỷ lệ học viên đã hoàn thành của từng Track trong chương trình học đối với cohort này.
      tags:
        - Cohorts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của Cohort
          required: true
          schema:
            type: string
            example: c_spring2026
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        trackId:
                          type: string
                          example: t1
                        title:
                          type: string
                          example: Local Dev Environment
                        completionPct:
                          type: integer
                          minimum: 0
                          maximum: 100
                          example: 92
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /cohorts/{id}/export:
    get:
      summary: Xuất báo cáo tiến độ học viên dạng CSV (Admin)
      description: Tải xuống file CSV chứa chi tiết tiến độ học tập, XP, level và trạng thái bài tập của tất cả học viên trong khóa.
      tags:
        - Cohorts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của Cohort
          required: true
          schema:
            type: string
            example: c_spring2026
      responses:
        '200':
          description: File CSV được sinh thành công.
          headers:
            Content-Type:
              schema:
                type: string
                example: text/csv
          content:
            text/csv:
              schema:
                type: string
                example: |
                  name,email,completion,xp,level,tracksCompleted,exercisesApproved
                  Mina Okonkwo,mina@acme.dev,46,1240,3,2,1
                  Raj Patel,raj@acme.dev,31,720,2,1,0
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  # =========================================================================
  # 4. TRACKS & LESSONS
  # =========================================================================
  /tracks:
    get:
      summary: Lấy danh sách lộ trình học (Authenticated)
      description: |
        Lấy danh sách các Track bài học theo thứ tự sắp xếp (có phân trang).
        Mỗi track sẽ kèm theo thông tin trạng thái học tập của người gọi API (`completed`, `in_progress`, `locked`).
      tags:
        - Tracks
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: Trang hiện tại (mặc định 1)
          required: false
          schema:
            type: integer
            default: 1
            example: 1
        - name: limit
          in: query
          description: Số lượng chặng trên mỗi trang (mặc định 20, tối đa 50)
          required: false
          schema:
            type: integer
            default: 20
            example: 10
