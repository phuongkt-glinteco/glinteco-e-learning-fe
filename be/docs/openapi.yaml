      description: Lấy danh sách các bài tập thực hành theo các bộ lọc trackId, độ khó và tag kiến thức. Mỗi bài tập trả về sẽ kèm theo trạng thái nộp bài của user gọi API.
      tags:
        - Exercises
      security:
        - BearerAuth: []
      parameters:
        - name: trackId
          in: query
          description: Lọc bài tập thuộc Track cụ thể
          required: false
          schema:
            type: string
            example: t3
        - name: tag
          in: query
          description: Lọc theo nhãn chuyên môn (ví dụ NestJS)
          required: false
          schema:
            type: string
            example: NestJS
        - name: difficulty
          in: query
          description: Lọc theo cấp độ khó
          required: false
          schema:
            type: string
            enum: [Beginner, Intermediate, Advanced]
            example: Intermediate
        - name: status
          in: query
          description: Lọc theo trạng thái bài nộp cá nhân
          required: false
          schema:
            type: string
            enum: [pending, submitted, approved, changes]
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExerciseSummary'
                  nextCursor:
                    type: string
                    nullable: true
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: Tạo bài tập thực hành mới (Admin)
      description: Tạo bài tập thực hành mới cho một lộ trình học cụ thể để kiểm tra năng lực của learner.
      tags:
        - Exercises
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - trackId
                - tag
                - difficulty
                - estimatedTime
                - xp
                - brief
                - overview
                - objectives
                - steps
              properties:
                title:
                  type: string
                  example: Service Auth Middleware
                trackId:
                  type: string
                  description: ID của track chứa bài tập này
                  example: t3
                tag:
                  type: string
                  description: Tag phân loại chuyên môn
                  example: NestJS
                difficulty:
                  type: string
                  enum: [Beginner, Intermediate, Advanced]
                  example: Intermediate
                estimatedTime:
                  type: string
                  example: 2h
                xp:
                  type: integer
                  description: Điểm kinh nghiệm nhận được khi hoàn tất bài tập
                  example: 180
                brief:
                  type: string
                  example: Add a JWT guard that attaches the user to the request.
                overview:
                  type: string
                  example: Every protected route runs through this guard...
                objectives:
                  type: array
                  items:
                    type: string
                  description: Tiêu chí nghiệm thu (Acceptance Criteria)
                  example: ["Verify JWT signature", "Attach user to request", "401 on invalid token"]
                steps:
                  type: array
                  items:
                    type: string
                  description: Các bước thực hiện gợi ý
                  example: ["Create the guard", "Register it globally", "Write the spec"]
                resourceDocIds:
                  type: array
                  items:
                    type: string
                  description: Danh sách ID tài liệu tham khảo
                  example: ["d5"]
                hint:
                  type: string
                  example: Reuse the shared JwtService config.
      responses:
        '201':
          description: Tạo thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: e4
                  title:
                    type: string
                    example: Service Auth Middleware
                  trackId:
                    type: string
                    example: t3
                  xp:
                    type: integer
                    example: 180
                  status:
                    type: string
                    example: pending
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /exercises/{id}:
    get:
      summary: Xem chi tiết bài tập (Authenticated)
      description: Lấy thông tin chi tiết đầy đủ của một bài tập bao gồm mô tả, gợi ý, tài liệu tham khảo và danh sách bước làm chi tiết.
      tags:
        - Exercises
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của bài tập
          required: true
          schema:
            type: string
            example: e2
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Không tìm thấy bài tập.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Chỉnh sửa thông tin bài tập (Admin)
      description: Chỉnh sửa các thông số XP, cấp độ khó, tiêu chuẩn nghiệm thu của bài tập.
      tags:
        - Exercises
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của bài tập
          required: true
          schema:
            type: string
            example: e4
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                xp:
                  type: integer
                  example: 200
                difficulty:
                  type: string
                  enum: [Beginner, Intermediate, Advanced]
                  example: Advanced
      responses:
        '200':
          description: Cập nhật thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: e4
                  xp:
                    type: integer
                    example: 200
                  difficulty:
                    type: string
                    example: Advanced
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Không tìm thấy bài tập.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Xóa bài tập (Admin)
      description: Xóa bỏ bài tập khỏi lộ trình học.
      tags:
        - Exercises
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của bài tập
          required: true
          schema:
            type: string
            example: e4
      responses:
        '204':
          description: Xóa thành công.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Không tìm thấy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================================================================
  # 7. SUBMISSIONS & REVIEW
  # =========================================================================
  /exercises/{id}/submissions:
    post:
      summary: Nộp link bài làm PR lần đầu (Learner)
      description: Học viên nộp bài tập bằng cách gửi link PR GitHub. Bài nộp được khởi tạo ở trạng thái `submitted` để chờ Admin review.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của bài tập
          required: true
          schema:
            type: string
            example: e3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prUrl
              properties:
                prUrl:
                  type: string
                  description: URL của Pull Request GitHub chứa bài giải
                  example: github.com/acme/web/pull/468
      responses:
        '201':
          description: Nộp bài thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Không tìm thấy bài tập.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Nộp lại / Cập nhật bài giải PR (Learner)
      description: Học viên cập nhật lại link PR khác hoặc cập nhật lại PR sau khi có yêu cầu sửa đổi từ Admin. Trạng thái sẽ đặt lại thành `submitted`.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID bài tập
          required: true
          schema:
            type: string
            example: e3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prUrl
              properties:
                prUrl:
                  type: string
                  example: github.com/acme/web/pull/470
      responses:
        '200':
          description: Cập nhật bài nộp thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /submissions:
    get:
      summary: Hàng đợi chấm bài / Lịch sử bài nộp (Admin)
      description: Lấy danh sách bài nộp phục vụ cho giao diện review chấm bài của Admin. Mặc định dùng để lấy danh sách bài đang chờ duyệt (`?status=submitted`).
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: Lọc theo trạng thái bài nộp
          required: false
          schema:
            type: string
            enum: [submitted, approved, changes]
            example: submitted
        - name: cohortId
          in: query
          description: Lọc bài nộp của học viên trong cohort cụ thể
          required: false
          schema:
            type: string
            example: c_spring2026
        - name: limit
          in: query
          description: Giới hạn bản ghi trả về
          required: false
          schema:
            type: integer
            maximum: 50
            default: 20
        - name: cursor
          in: query
          description: Cursor phân trang danh sách
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SubmissionFeedItem'
                  nextCursor:
                    type: string
                    nullable: true
                    example: eyJzdWJtaXR0ZWRBdCI6…
                  hasMore:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /submissions/mine:
    get:
      summary: Danh sách bài tập đã nộp của tôi (Learner)
      description: Trả về danh sách tất cả các bài nộp của chính learner đang đăng nhập.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: s1
                        exerciseId:
                          type: string
                          example: e2
                        exercise:
                          type: string
                          example: Add a Paginated Users Endpoint
                        prUrl:
                          type: string
                          example: github.com/acme/api/pull/119
                        status:
                          type: string
                          enum: [submitted, approved, changes]
                          example: submitted
                        submittedAt:
                          type: string
                          format: date-time
                          example: 2026-06-15T11:11:00Z
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /submissions/{id}:
    get:
      summary: Xem chi tiết một bài nộp (Authenticated)
      description: |
        Xem chi tiết một bản ghi bài nộp cùng trạng thái và nhận xét.
        * Phân quyền:* Chủ nhân bài nộp (`learner`) hoặc bất kỳ `admin` nào được quyền truy cập.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của bài nộp (Submission ID)
          required: true
          schema:
            type: string
            example: s1
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Không tìm thấy bài nộp.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /submissions/{id}/approve:
    post:
      summary: Phê duyệt bài nộp (Admin)
      description: Admin phê duyệt bài giải PR của học viên. Bài tập sẽ chuyển sang trạng thái `approved`, học viên nhận được XP thưởng của bài tập và tổng XP của họ được cập nhật.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của bài nộp
          required: true
          schema:
            type: string
            example: s1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  description: Nhận xét phê duyệt từ Admin
                  example: Clean keyset impl, nice tests.
      responses:
        '200':
          description: Phê duyệt thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: s1
                  status:
                    type: string
                    example: approved
                  exerciseId:
                    type: string
                    example: e2
                  exerciseStatus:
                    type: string
                    example: approved
                  reviewerId:
                    type: string
                    example: u_lead
                  reviewedAt:
                    type: string
                    format: date-time
                    example: 2026-06-15T11:50:00Z
                  xpAwarded:
                    type: integer
                    example: 200
                  learnerTotalXp:
                    type: integer
                    example: 1440
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Không tìm thấy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /submissions/{id}/request-changes:
    post:
      summary: Yêu cầu sửa đổi bài nộp (Admin)
      description: Admin từ chối phê duyệt và yêu cầu học viên sửa lại bài làm kèm theo ghi chú nhận xét cụ thể. Bài nộp sẽ chuyển sang trạng thái `changes`.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID bài nộp
          required: true
          schema:
            type: string
            example: s2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - note
              properties:
                note:
                  type: string
                  description: Nội dung chi tiết các yêu cầu học viên cần chỉnh sửa
                  example: Status-dot color should reuse getStatusColor() instead of a new switch.
      responses:
        '200':
          description: Yêu cầu sửa đổi thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: s2
                  status:
                    type: string
                    example: changes
                  exerciseId:
                    type: string
                    example: e1
                  exerciseStatus:
                    type: string
                    example: pending
                  reviewerId:
                    type: string
                    example: u_lead
                  reviewNote:
                    type: string
                    example: Status-dot color should reuse getStatusColor()…
                  reviewedAt:
                    type: string
                    format: date-time
                    example: 2026-06-15T11:52:00Z
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /submissions/{id}/history:
    get:
      summary: Tra cứu lịch sử các lần nộp của bài tập (Proposed - Authenticated)
      description: Lấy nhật ký tất cả các phiên bản nộp bài (các link PR cũ) và nội dung nhận xét tương ứng qua các vòng review chấm bài của bài tập này.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của bài nộp chính
          required: true
          schema:
            type: string
            example: s1
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionHistoryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Không tìm thấy lịch sử.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================================================================
  # 8. SEARCH & NOTIFICATIONS
  # =========================================================================
  /search:
    get:
      summary: Tìm kiếm nhanh toàn hệ thống (Authenticated)
      description: Hỗ trợ tính năng Quick Search (Ctrl+K / Cmd+K) trên giao diện để tìm kiếm đồng thời trên cả Tracks, Documents, và Exercises.
      tags:
        - Search & Notifications
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          description: Từ khóa tìm kiếm
          required: true
          schema:
            type: string
            example: auth
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tracks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: t3
                        title:
                          type: string
                          example: NestJS Service Layer
                  documents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: d5
                        title:
                          type: string
                          example: Service Auth & JWT Flow
                        kind:
                          type: string
                          example: Guide
                  exercises:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: e4
                        title:
                          type: string
                          example: Service Auth Middleware
                        tag:
                          type: string
                          example: NestJS
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /notifications:
    get:
      summary: Lấy danh sách thông báo cá nhân (Authenticated)
      description: Lấy danh sách các thông báo trong trung tâm thông báo của người dùng đăng nhập hiện tại (ví dụ bài tập được duyệt, track mới mở khóa).
      tags:
        - Search & Notifications
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  unreadCount:
                    type: integer
                    description: Số lượng thông báo chưa đọc
                    example: 1
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /notifications/{id}/read:
    post:
      summary: Đánh dấu đã đọc thông báo (Authenticated)
      description: Cập nhật trạng thái một thông báo thành đã đọc (`read = true`).
      tags:
        - Search & Notifications
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID của thông báo cần đọc
          required: true
          schema:
            type: string
            example: n1
      responses:
        '200':
          description: Cập nhật thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: n1
                  read:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Không tìm thấy thông báo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================================================================
  # 9. LEADERS & GAMIFICATION
  # =========================================================================
  /leaderboard:
    get:
      summary: Bảng xếp hạng thi đua học tập (Proposed - Authenticated)
      description: Lấy bảng xếp hạng học viên sắp xếp theo XP giảm dần trong phạm vi Cohort hoặc toàn công ty để thúc đẩy học tập.
      tags:
        - Leaderboard
      security:
        - BearerAuth: []
      parameters:
        - name: cohortId
          in: query
          description: Lọc bảng xếp hạng theo khóa học cụ thể. Nếu bỏ trống và scope là cohort, hệ thống tự động lấy cohort của học viên hiện tại.
          required: false
          schema:
            type: string
            example: c_spring2026
        - name: scope
          in: query
          description: Phạm vi bảng xếp hạng (cohort hoặc global). Nếu chọn cohort và không truyền cohortId, hệ thống tự động lấy cohort của học viên hiện tại.
          required: false
          schema:
            type: string
            enum:
              - cohort
              - global
            default: global
            example: global
        - name: limit
          in: query
          description: Số lượng học viên hiển thị tối đa trên bảng xếp hạng
          required: false
          schema:
            type: integer
            maximum: 100
            default: 10
            example: 3
