      description: Lấy danh sách tài liệu trong thư viện Wiki. Hỗ trợ tìm kiếm từ khóa, lọc theo tags và kind.
      tags:
        - Documents
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          description: Từ khóa tìm kiếm trong tiêu đề
          required: false
          schema:
            type: string
            example: auth
        - name: tags
          in: query
          description: Lọc danh sách tag phân tách bằng dấu phẩy
          required: false
          schema:
            type: string
            example: NestJS,Architecture
        - name: kind
          in: query
          description: Lọc theo phân loại tài liệu
          required: false
          schema:
            type: string
            enum: [Guide, Reference, Runbook, Tutorial, Link]
            example: Guide
        - name: limit
          in: query
          description: Số bản ghi tối đa trả về
          required: false
          schema:
            type: integer
            maximum: 50
            default: 20
            example: 20
