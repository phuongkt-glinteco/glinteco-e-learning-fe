          in: query
          description: Con trỏ phục vụ phân trang
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Thành công.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Document'
